name: Update Flake

on:
  schedule:
    # Run weekly on Sundays at 00:00 UTC
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  update-flake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Remove GitHub auth headers
        run: |
          git config --global --unset-all http.https://github.com/.extraheader || true
          git config --global --unset-all http.https://api.github.com/.extraheader || true
          git config --local --unset-all http.https://github.com/.extraheader || true
          git config --local --unset-all http.https://api.github.com/.extraheader || true

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Setup cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/nix
          key: ${{ runner.os }}-nix-${{ hashFiles('flake.lock') }}
          restore-keys: |
            ${{ runner.os }}-nix-

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update flake inputs
        run: nix flake update

      - name: Check flake still evaluates
        run: nix flake check --show-trace

      - name: Verify lib and modules still export correctly
        run: |
          nix eval .#lib --apply builtins.attrNames
          nix eval .#nixosModules.default --apply 'x: "ok"'
          nix eval .#homeModules.default --apply 'x: "ok"'

      - name: Commit and push flake.lock update
        run: |
          git add flake.lock
          if git diff --cached --quiet; then
            echo "No changes to flake.lock"
            exit 0
          fi
          git commit -m "flake: update flake.lock [skip ci]"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
